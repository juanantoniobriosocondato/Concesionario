<div class="login-wrapper d-flex align-items-center justify-content-center">
  <mat-card class="login-card shadow-lg">
    <mat-card-header class="text-center d-block pt-4">
      <mat-card-title class="fw-bold text-dark fs-3">INICIAR SESIÓN</mat-card-title>
      <mat-card-subtitle class="mt-2 text-secondary">Accede a tu cuenta de Concoches</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="p-4">
      <form #loginForm="ngForm" (ngSubmit)="onLogin()">
        
        <mat-form-field appearance="fill" class="w-100 mb-3">
          <mat-label>Correo electrónico</mat-label>
          <input matInput type="email" name="correo" [(ngModel)]="loginData.correo" required placeholder="admin@concesionario.com">
          <mat-icon matSuffix class="text-secondary">email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-100 mb-4">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="loginData.password" required>
          <mat-icon matSuffix class="text-secondary">lock</mat-icon>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid" class="w-100 py-2 fw-bold mb-3">
          ENTRAR
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
