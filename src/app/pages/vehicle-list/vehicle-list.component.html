<div class="container mt-4">
  <h2>EXPLORAR VEHÍCULOS</h2>

  <div class="filter-container p-3 mb-4 shadow-sm rounded">
    <div class="row g-3">
      <div class="col-md-3">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Marca</mat-label>
          <mat-select [(ngModel)]="filterBrand" (selectionChange)="applyFilters()">
            <mat-option value="">Todas</mat-option>
            <mat-option value="Audi">Audi</mat-option>
            <mat-option value="Volvo">Volvo</mat-option>
            <mat-option value="Mercedes">Mercedes</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-md-3">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Color</mat-label>
            <input matInput 
         [(ngModel)]="filterColor" 
         (input)="applyFilters()" 
         placeholder="Ej: Gris"
         name="colorFiltro"> 
        </mat-form-field>
      </div>

      <div class="col-md-3">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Estado</mat-label>
          <mat-select [(ngModel)]="filterStatus" (selectionChange)="applyFilters()">
            <mat-option value="">Todos</mat-option>
            <mat-option value="Disponible">Disponible</mat-option>
            <mat-option value="Reservado">Reservado</mat-option>
            <mat-option value="Vendido">Vendido</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-md-3 d-flex align-items-center">
        <button mat-button color="warn" (click)="resetFilters()">
          <mat-icon>filter_alt_off</mat-icon> LIMPIAR
        </button>
      </div>
    </div>
  </div>
 
  <div class="container mt-4" *ngIf="(authService.currentUser$ | async) as user">
  <div *ngIf="user.Rol === 'Administrador'" class="mb-4">
    <button mat-flat-button color="accent" class="w-100 py-3 rounded-pill fw-bold">
      <mat-icon class="me-2">add</mat-icon> AÑADIR NUEVO VEHÍCULO
    </button>
  </div>
</div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
  
  <mat-card 
    *ngFor="let vehicle of vehicles" 
    [routerLink]="['/vehiculo', vehicle.Id]"
    class="cursor-pointer hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 overflow-hidden border-none"
  >
    
    <img mat-card-image [src]="vehicle.Fotografia || 'https://via.placeholder.com/400x200'" 
         [alt]="vehicle.Nombre" class="h-56 w-full object-cover">
    
    <mat-card-content class="p-5 bg-[#333333] text-white"> 
      <div class="flex justify-between items-start mb-3">
        <p class="text-xs font-bold uppercase tracking-wider text-blue-400">
          {{vehicle.Marca}}
        </p>
        <span class="text-xs px-2 py-1 bg-green-600 text-white rounded-full font-bold uppercase">
          {{vehicle.Estado}}
        </span>
      </div>

      <h3 class="text-2xl font-bold text-white mb-2">{{vehicle.Nombre}}</h3>

      <div class="space-y-2 border-t border-gray-600 pt-4 mt-2">
        <div class="flex items-center text-gray-300 text-sm">
          <mat-icon class="mr-2 text-blue-300 scale-75">calendar_today</mat-icon> 
          <span>{{vehicle.FechaCreacion}}</span>
        </div>
        <div class="flex items-center text-gray-300 text-sm">
          <mat-icon class="mr-2 text-blue-300 scale-75">palette</mat-icon> 
          <span>{{vehicle.Color}}</span>
        </div>
        <!--A PARTIR DE AQUI TENGO QUE PONERLO EN NGIF PARA QUE SOLO LO VEAN ADMINS-->
        <div *ngIf="(authService.currentUser$ | async)?.Rol === 'Administrador'" class="flex items-center text-gray-300 text-sm">
          <button mat-flat-button color="accent" class="w-100 py-3 rounded-pill fw-bold text-uppercase">
            <mat-icon class="me-2">edit</mat-icon> Editar
          </button>
        </div>
        <div *ngIf="(authService.currentUser$ | async)?.Rol === 'Administrador' && (vehicle.Estado === 'Disponible')" class="flex items-center text-gray-300 text-sm">
          <button mat-flat-button color="accent" class="w-100 py-3 rounded-pill fw-bold text-uppercase" (click)="eliminarVehiculo(vehicle.Id!, $event)">
            <mat-icon class="me-2">delete</mat-icon> Eliminar
          </button>
        </div>
      </div>
    </mat-card-content>

    </mat-card>
</div>
</div>
