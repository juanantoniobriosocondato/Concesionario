<div class="p-8 bg-gray-100 min-h-screen">
  <div class="w-full h-64 bg-gray-200 overflow-hidden mb-8 rounded-lg">
    <img src="https://motor.elpais.com/wp-content/uploads/2018/10/Concesioario-1800x728.jpg" alt="Concesionario" class="w-full h-full object-cover">
  </div>
  <h2 class="text-3xl font-bold mb-8 text-center">Nuestro Catálogo completo</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
  
  <mat-card 
    *ngFor="let vehicle of latestVehicles" 
    [routerLink]="['/vehiculo', vehicle.id]"
    class="cursor-pointer hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 overflow-hidden border-none"
  >
    
    <img mat-card-image [src]="vehicle.Fotografia || 'https://via.placeholder.com/400x200'" 
         [alt]="vehicle.Nombre" class="h-56 w-full object-cover">
    
    <mat-card-content class="p-5 bg-[#333333] text-white"> 
      <div class="flex justify-between items-start mb-3">
        <p class="text-xs font-bold uppercase tracking-wider text-blue-400">
          Marca: {{vehicle.Marca}}
        </p>
        <span class="text-xs px-2 py-1 bg-green-600 text-white rounded-full font-bold uppercase">
          Estado {{vehicle.Estado}}
        </span>
      </div>

      <h3 class="text-2xl font-bold text-white mb-2">{{vehicle.Nombre}}</h3>

      <div class="space-y-2 border-t border-gray-600 pt-4 mt-2">
        <div class="flex items-center text-gray-300 text-sm">
          <mat-icon class="mr-2 text-blue-300 scale-75">calendar_today</mat-icon> 
          <span>{{vehicle.FechaCreacion}}</span>
        </div>
        <div class="flex items-center text-gray-300 text-sm">
          <mat-icon class="mr-2 text-blue-300 scale-75">palette</mat-icon> 
          <span>{{vehicle.Color}}</span>
        </div>
      </div>
    </mat-card-content>

    </mat-card>
</div>
<div class="verVehiculos my-10">
    <button mat-flat-button color="primary" routerLink="/vehiculos" class="px-8 py-6 text-lg">
      Ver todos los vehículos
    </button>
  </div>
</div>
