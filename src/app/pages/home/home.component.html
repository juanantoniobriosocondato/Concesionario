<div class="flex flex-col items-center">
  <div class="w-full h-64 bg-gray-200 overflow-hidden mb-8 rounded-lg">
    <img src="https://motor.elpais.com/wp-content/uploads/2018/10/Concesioario-1800x728.jpg" alt="Concesionario" class="w-full h-full object-cover">
  </div>

  <h2 class="text-2xl font-bold mb-6">Nuestras últimas novedades</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full px-4">
    <mat-card *ngFor="let car of latestVehicles" class="cursor-pointer hover:shadow-lg transition-shadow" [routerLink]="['/vehiculo', car.id]">
      <img mat-card-image [src]="car.photoUrl" [alt]="car.name" class="h-48 object-cover">
      <mat-card-content class="pt-4 bg-[#333333] text-white"> <div class="flex justify-between items-start mb-2">
    <p class="text-sm font-bold uppercase text-blue-400">{{car.brand}}</p>
    <span class="text-xs px-2 py-1 bg-green-500 text-white rounded font-bold">{{car.status}}</span>
  </div>
  
  <h3 class="text-xl font-bold text-white mb-4">{{car.name}}</h3>
  
  <div class="space-y-2 text-sm">
    <p class="flex items-center text-gray-100">
      <mat-icon class="mr-3 text-blue-300">calendar_today</mat-icon> 
      {{car.manufacturingYear}}
    </p>
    <p class="flex items-center text-gray-100">
      <mat-icon class="mr-3 text-blue-300">palette</mat-icon> 
      {{car.bodyColor}}
    </p>
    <p class="flex items-center text-gray-100">
      <mat-icon class="mr-3 text-blue-300">fitness_center</mat-icon> 
      {{car.weight}} kg
    </p>
  </div>
</mat-card-content>
    </mat-card>
  </div>

  <div class="my-10">
    <button mat-flat-button color="primary" routerLink="/vehiculos" class="px-8 py-6 text-lg">
      Ver todos los vehículos
    </button>
  </div>
</div>
