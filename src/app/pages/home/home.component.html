<div class="flex flex-col items-center">
  <div class="w-full h-64 bg-gray-200 overflow-hidden mb-8 rounded-lg">
    <img src="https://images.unsplash.com/photo-1562141984-6a0665399583" alt="Concesionario" class="w-full h-full object-cover">
  </div>

  <h2 class="text-2xl font-bold mb-6">Nuestras últimas novedades</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full px-4">
    <mat-card *ngFor="let car of latestVehicles" class="cursor-pointer hover:shadow-lg transition-shadow" [routerLink]="['/vehiculo', car.id]">
      <img mat-card-image [src]="car.photoUrl" [alt]="car.name" class="h-48 object-cover">
      <mat-card-content class="pt-4">
        <div class="flex justify-between items-start">
          <p class="text-sm font-semibold uppercase text-blue-600">{{car.brand}}</p>
          <span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded">{{car.status}}</span>
        </div>
        <h3 class="text-lg font-bold">{{car.name}}</h3>
        
        <div class="mt-2 space-y-1 text-sm text-gray-600">
          <p><mat-icon class="align-middle text-base">calendar_today</mat-icon> {{car.manufacturingYear}}</p>
          <p><mat-icon class="align-middle text-base">palette</mat-icon> {{car.bodyColor}}</p>
          <p><mat-icon class="align-middle text-base">fitness_center</mat-icon> {{car.weight}} kg</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="my-10">
    <button mat-flat-button color="primary" routerLink="/vehiculos" class="px-8 py-6 text-lg">
      Ver todos los vehículos
    </button>
  </div>
</div>
