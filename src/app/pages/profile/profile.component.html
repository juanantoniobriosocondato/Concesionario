<div class="flex justify-center items-center py-12 px-4 min-h-[calc(100vh-250px)]" *ngIf="user">
  
  <mat-card class="w-full max-w-md !bg-white shadow-2xl border border-gray-200 rounded-2xl overflow-hidden">
    
    <div class="h-32 bg-[#d81b60] relative">
      <div class="absolute -bottom-12 left-1/2 transform -translate-x-1/2">
        <div class="w-24 h-24 rounded-full border-4 border-white shadow-lg bg-[#c2185b] flex items-center justify-center text-white text-3xl font-bold overflow-hidden">
          <img *ngIf="user.avatarUrl" [src]="user.avatarUrl" alt="Avatar" class="w-full h-full object-cover">
          <span *ngIf="!user.avatarUrl">{{user.name.charAt(0)}}</span>
        </div>
      </div>
    </div>

    <mat-card-content class="pt-20 pb-8 px-8 text-center">
      
      <div class="mt-12 mb-6">
    <h2 class="text-3xl font-extrabold text-gray-800 mb-1 leading-tight">
      {{user.name}}
    </h2>
    <p class="text-gray-500 font-medium italic">{{user.email}}</p>
  </div>

  <div class="inline-block px-5 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-8 bg-blue-600 text-white">
    {{user.role}}
  </div>

      <mat-divider class="mb-8"></mat-divider>

      <div class="text-left text-sm text-gray-600 mb-10 space-y-5">
        <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-xl">
          <mat-icon class="text-green-500">verified_user</mat-icon>
          <span class="font-medium">Estado de la cuenta: <span class="text-green-700 font-bold uppercase ml-1">Activa</span></span>
        </div>
      </div>

      <div class="flex flex-col gap-3">
        <button mat-button color="warn" 
                class="w-full !py-7 !rounded-2xl font-black tracking-widest hover:bg-red-50 transition-colors border-2 border-transparent hover:border-red-100" 
                (click)="logout()">
          <mat-icon class="mr-2">logout</mat-icon> CERRAR SESIÓN
        </button>
      </div>

    </mat-card-content>
  </mat-card>
</div>
