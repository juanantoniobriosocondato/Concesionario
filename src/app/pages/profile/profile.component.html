<div class="container mx-auto p-6 flex justify-center items-center min-h-[70vh]">
  
  <mat-card class="w-full max-w-md !bg-white shadow-2xl border border-gray-200 rounded-2xl overflow-hidden">
    
    <div class="h-32 bg-[#d81b60] relative">
      <div class="absolute -bottom-12 left-1/2 transform -translate-x-1/2">
        <img [src]="user.avatarUrl" alt="Avatar del usuario" class="w-24 h-24 rounded-full border-4 border-white shadow-lg">
      </div>
    </div>

    <mat-card-content class="pt-16 pb-6 px-8 text-center">
      
      <div class="mt-4 mb-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">{{user.name}}</h2>
        <p class="text-gray-500">{{user.email}}</p>
      </div>

      <div class="inline-block px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-6"
           [ngClass]="user.role === 'Admin' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700'">
        Rol: {{user.role}}
      </div>

      <mat-divider class="mb-6"></mat-divider>

      <div class="text-left text-sm text-gray-600 mb-8 space-y-4">
        <div class="flex items-center gap-3">
          <mat-icon class="text-gray-400">calendar_today</mat-icon>
          <span>Miembro desde: <strong>{{user.joinDate | date:'longDate'}}</strong></span>
        </div>
        <div class="flex items-center gap-3">
          <mat-icon class="text-gray-400">verified_user</mat-icon>
          <span>Estado de la cuenta: <strong class="text-green-600">Activa</strong></span>
        </div>
      </div>

      <div class="flex flex-col gap-3">
        <button mat-flat-button class="!bg-gray-800 !text-white w-full !py-2">
          <mat-icon>edit</mat-icon> EDITAR DATOS
        </button>
        
        <button mat-stroked-button color="warn" class="w-full !py-2 font-bold" (click)="logout()">
          <mat-icon>logout</mat-icon> CERRAR SESIÓN
        </button>
      </div>

    </mat-card-content>
  </mat-card>

</div>
