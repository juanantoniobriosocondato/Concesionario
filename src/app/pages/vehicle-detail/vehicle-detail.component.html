<div class="max-w-6xl mx-auto p-6" *ngIf="vehicle; else notFound">
  <button mat-stroked-button color="primary" routerLink="/vehiculos" class="mb-6">
    <mat-icon>arrow_back</mat-icon> Volver
  </button>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-10 bg-white p-8 rounded-xl shadow-lg">
    <div class="rounded-lg overflow-hidden border border-gray-100">
      <img [src]="vehicle.photoUrl" [alt]="vehicle.name" class="w-full h-full object-cover min-h-[400px]">
    </div>

    <div class="flex flex-col">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">{{vehicle.name}}</h1>
      <p class="text-blue-600 font-semibold text-lg uppercase mb-6">{{vehicle.brand}}</p>

      <div class="space-y-4 flex-grow">
        <div class="flex items-center text-gray-700">
          <mat-icon class="mr-3 text-gray-400">event</mat-icon>
          <span class="font-medium mr-2">Año de fabricación:</span> {{vehicle.manufacturingYear}}
        </div>
        <div class="flex items-center text-gray-700">
          <mat-icon class="mr-3 text-gray-400">calendar_month</mat-icon>
          <span class="font-medium mr-2">Matriculación:</span> {{vehicle.registrationDate | date:'dd/MM/yyyy'}}
        </div>
        <div class="flex items-center text-gray-700">
          <mat-icon class="mr-3 text-gray-400">scale</mat-icon>
          <span class="font-medium mr-2">Peso:</span> {{vehicle.weight}} kg
        </div>
        <div class="flex items-center text-gray-700">
          <mat-icon class="mr-3 text-gray-400">palette</mat-icon>
          <span class="font-medium mr-2">Color:</span> {{vehicle.bodyColor}}
        </div>
        <div class="mt-6">
          <span class="px-4 py-2 rounded-full text-sm font-bold uppercase tracking-wider"
                [ngClass]="{
                  'bg-green-100 text-green-700': vehicle.status === 'disponible',
                  'bg-orange-100 text-orange-700': vehicle.status === 'reservado',
                  'bg-red-100 text-red-700': vehicle.status === 'vendido'
                }">
            {{vehicle.status}}
          </span>
        </div>
      </div>

      <div class="mt-10 border-t pt-6">
        <button mat-raised-button color="accent" class="w-full py-6 text-lg uppercase font-bold" *ngIf="vehicle.status === 'disponible'">
          Reservar Vehículo
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #notFound>
  <div class="text-center mt-20">
    <h2 class="text-2xl font-semibold">Vehículo no encontrado</h2>
    <button mat-button color="primary" routerLink="/">Volver al inicio</button>
  </div>
</ng-template>
