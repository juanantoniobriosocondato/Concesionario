<div class="container mt-5" *ngIf="vehicle">
  <button mat-button routerLink="/vehicles" class="mb-3">
    <mat-icon>arrow_back</mat-icon> VOLVER AL LISTADO
  </button>

  <div class="row shadow-lg rounded overflow-hidden bg-white">
    <div class="col-md-6 p-0">
      <img [src]="vehicle.fotografia" [alt]="vehicle.nombre" class="img-fluid h-100 w-100" style="object-fit: cover;">
    </div>

    <div class="col-md-6 p-5">
      <h1 class="display-4 fw-bold">{{vehicle.nombre}}</h1>
      <p class="text-primary h4 text-uppercase mb-4">{{vehicle.marca}}</p>

      <hr>

      <div class="row mt-4">
        <div class="col-6 mb-3">
          <span class="text-muted d-block">Estado</span>
          <span class="badge" [ngClass]="{
            'bg-success': vehicle.estado === 'Disponible',
            'bg-warning': vehicle.estado === 'Reservado',
            'bg-danger': vehicle.estado === 'Vendido'
          }">{{vehicle.estado}}</span>
        </div>
        <div class="col-6 mb-3">
          <span class="text-muted d-block">Año de fabricación</span>
          <strong>{{vehicle.fechaCreacion}}</strong>
        </div>
        <div class="col-6 mb-3">
          <span class="text-muted d-block">Peso</span>
          <strong>{{vehicle.peso}} kg</strong>
        </div>
        <div class="col-6 mb-3">
          <span class="text-muted d-block">Color</span>
          <strong>{{vehicle.color}}</strong>
        </div>
      </div>

      <div class="mt-5 d-grid gap-2">
        <button mat-raised-button color="primary" size="large">CONTACTAR PARA RESERVAR</button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="!vehicle" class="text-center mt-5">
  <p>Cargando información del vehículo...</p>
</div>
